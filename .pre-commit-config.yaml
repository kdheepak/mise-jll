repos:
  - repo: local
    hooks:
      - id: lua-language-server-check
        name: lua-language-server check
        entry: lua-language-server --check .
        language: system
        pass_filenames: false
        files: \.lua$

      - id: stylua
        name: stylua
        entry: stylua
        language: system
        files: \.lua$

      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.(yml|yaml)$
