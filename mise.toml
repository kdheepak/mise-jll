[env]
MISE_USE_VERSIONS_HOST = "0"

[settings]
experimental = true

[tools]
actionlint = "latest"
lua-language-server = "latest"
prek = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Run prek hooks across the repository"
run = "prek run --all-files"

[tasks.lint-fix]
description = "Format Lua files and rerun prek hooks"
depends = ["format"]
run = "prek run --all-files"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "test"]
